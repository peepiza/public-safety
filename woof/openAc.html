<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение "Аркадий-паровозов"</title>
    <link rel="apple-touch-icon" href="/icons/launchericon-192x192.png">
    <link rel="shortcut icon" href="/icons/launchericon-48x48.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: white;
            max-width: 400px;
            width: 100%;
            padding: 200px 60px;
            border-radius: 60px;
            text-align: center;
        }

        .app-title {
            color: #000;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        .btn-primary {
            background-color: #45679a;
            color: white;
            border: 2px solid #000000;
        }

        .btn-primary:hover {
            background-color: #3f5981;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000000
        }

        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #000;
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 13px 20px;
            border: 3px solid #45679a;
            border-radius: 50px;
            font-size: 18px;
            outline: none;
            background-color: white;
        }

        .input-group input:focus {
            border-color: #317530;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding-bottom: 3px;
        }

        .back-link:hover {
            color: #317530;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 class="app-title">Вход</h1>

        <div class="input-group">
            <label>Имя</label>
            <input type="text" placeholder="введи никнейм" id="username">
        </div>

        <div class="input-group">
            <label>Пароль</label>
            <input type="password" placeholder="введи пароль" id="password">
        </div>

        <button id="loginButton" class="btn btn-primary">Войти</button>

        <a href="../index.html" class="back-link">← Назад</a>
    </div>
    <script>

        document.addEventListener('DOMContentLoaded', function () {
            const loginButton = document.getElementById('loginButton');
            const API_URL = 'https://safitypath.onrender.com/api';

            if (loginButton) {
                loginButton.addEventListener('click', async function (event) {
                    event.preventDefault();

                    clearErrors();

                    const usernameInput = document.getElementById('username');
                    const passwordInput = document.getElementById('password');

                    const username = usernameInput.value.trim();
                    const password = passwordInput.value.trim();

                    let isValid = true;

                    if (username === "") {
                        showError(usernameInput, 'Введите никнейм');
                        isValid = false;
                    } else if (username.length < 3) {
                        showError(usernameInput, 'Никнейм должен быть минимум 3 символа');
                        isValid = false;
                    } else if (username.length > 20) {
                        showError(usernameInput, 'Никнейм не должен превышать 20 символов');
                        isValid = false;
                    } else if (!/^[a-zA-Z0-9а-яА-ЯёЁ]+$/.test(username)) {
                        showError(usernameInput, 'Никнейм может содержать только буквы и цифры');
                        isValid = false;
                    }

                    if (password === "") {
                        showError(passwordInput, 'Введите пароль');
                        isValid = false;
                    }

                    if (isValid) {
                        try {
                            const response = await fetch(`${API_URL}/auth/login`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({
                                    name: username,
                                    password: password
                                })
                            });

                            const result = await response.json();

                            if (result.success) {
                                localStorage.setItem('currentUser', JSON.stringify(result.user));
                                alert('Вход выполнен успешно!');
                                setTimeout(() => {
                                    window.location.href = 'agreement.html';
                                }, 500);
                            } else {
                                showError(usernameInput, result.message);
                                showError(passwordInput, result.message);
                            }
                        } catch (error) {
                            console.error('Error:', error);
                            alert('Ошибка подключения к серверу. Убедитесь, что сервер запущен.');
                        }
                    }
                });
            }

            function showError(input, message) {
                input.style.border = '2px solid #ff3860';

                const inputGroup = input.closest('.input-group');
                if (inputGroup) {
                    const oldError = inputGroup.querySelector('.error-message');
                    if (oldError) oldError.remove();

                    const errorMsg = document.createElement('small');
                    errorMsg.classList.add('error-message');
                    errorMsg.style.color = '#ff3860';
                    errorMsg.style.fontSize = '12px';
                    errorMsg.style.marginLeft = '15px';
                    errorMsg.style.marginTop = '5px';
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = message;
                    inputGroup.appendChild(errorMsg);
                }
            }

            function clearErrors() {
                document.querySelectorAll('.input-group input').forEach(input => {
                    input.style.border = '';
                });
                document.querySelectorAll('.error-message').forEach(el => el.remove());
            }
        });

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const loginButton = document.getElementById('loginButton');
                if (loginButton) {
                    loginButton.click();
                }
            }
        });
    </script>
    </script>
</body>

</html>
