<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение "Аркадий-паровозов"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .settings-card {
            background-color: white;
            max-width: 400px;
            width: 100%;
            padding: 90px 25px;
            border-radius: 30px;
            border: 3px solid #000;
            position: relative;
        }

        .app-title {
            color: #000;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
            text-align: center;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            background-color: white;
            padding: 15px;
            border-radius: 80px;
            border: 3px solid #45679a;
        }

        .avatar-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #d5d8de;
            border: 3px solid #45679a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
        }

        .avatar-edit {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 28px;
            height: 28px;
            background-color: white;
            border: 1px solid #000000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .avatar-edit:hover {
            transform: scale(1.1);
            background-color: white;
            border: 3px solid #317530 ;
        }

        .nickname-container {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: white;
            padding: 12px 18px;
            border-radius: 40px;
            border: 3px solid #45679a;
        }

        .nickname {
            color: #000;
            font-size: 20px;
            font-weight: 600;
            flex: 1;
            text-align: left;
        }

        .nickname-edit {
            width: 32px;
            height: 32px;
            background-color: white;
            border: 1px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nickname-edit:hover {
            transform: scale(1.1);
            background-color: white;
            border: 3px solid #317530 ;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 25px;
            background-color: white;
            border: 3px solid #45679a;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #000;
            font-size: 20px;
            font-weight: 600;
        }

        .menu-btn:hover {
            background-color: #d1f5cf;
            border-color: #317530;
            transform: translateX(3px);
            color: #000
        }

        .menu-text {
            flex: 1;
            text-align: left;
        }

        .arrow-icon {
            font-size: 24px;
            opacity: 0.7;
        }

        .back-btn-container {
            position: relative;
            height: 60px;
            margin-top: 20px;
        }

        .back-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background-color: #c1c5cd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background-color: #45679a;
            transform: translateY(-1px);
        }

        .back-btn:active {
            transform: translateY(1px);
            box-shadow: 0 0 0 #000;
        }

        @keyframes popupAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

    </style>
</head>

<body>
    <div class="settings-card">
        <h1 class="app-title">Настройки</h1>
        <div class="profile-section">
            <div class="avatar-container">
                <div class="avatar">
                    😼
                </div>
                <div class="avatar-edit" onclick="showInfo('avatar')">
                    ✏️
                </div>
            </div>
            <div class="nickname-container">
                <span class="nickname" id="nicknameDisplay">Аркадий-паровозов</span>
                <div class="nickname-edit" onclick="showInfo('nickname')">
                    ✏️
                </div>
            </div>
        </div>

        <div class="menu-buttons">
            <div class="menu-btn" onclick="location.href='../woof/account.html'">
                <span class="menu-text">Аккаунт</span>
            </div>
            <div class="menu-btn" onclick="showInfo('theme')">
                <span class="menu-text">Тема</span>
            </div>
            <div class="menu-btn" onclick="location.href='../woof/instra.html'">
                <span class="menu-text">Инструкция</span>
            </div>
            <div class="menu-btn" onclick="showInfo('blacklist')">
                <span class="menu-text">Черный список</span>
            </div>
        </div>

        <div class="back-btn-container">
            <div class="back-btn" onclick="location.href='../woof/map.html'">
                ←
            </div>
        </div>
    </div>
    <script src="../meow/settings.js"></script>
</body>

</html>
