<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение "Аркадий-паровозов"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: white;
            max-width: 400px;
            width: 100%;
            padding: 40px 60px;
            border-radius: 60px;
            border: 3px solid #000;
            text-align: center;
        }

        .app-title {
            color: #000;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #000;
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 13px 20px;
            border: 3px solid #45679a;
            border-radius: 50px;
            font-size: 18px;
            outline: none;
            background-color: white;
        }

        .input-group input:focus {
            border-color: #317530;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: #45679a;
            color: white;
            border: 2px solid #000000;
        }

        .btn-primary:hover {
            background-color: #3f5981;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000000
        }

        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding-bottom: 3px;
        }

        .back-link:hover {
            color: #317530;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 class="app-title">Регистрация</h1>

        <div class="input-group">
            <label>Имя</label>
            <input type="text" id="name-input" placeholder="придумай никнейм">
        </div>

        <div class="input-group">
            <label>Номер телефона</label>
            <input type="tel" id="number-input" placeholder="+7 (989) 943-49-63">
        </div>

        <div class="input-group">
            <label>Дата рождения</label>
            <input type="date" id="data-input" placeholder="ДД.ММ.ГГГГ">
        </div>

        <div class="input-group">
            <label>Придумайте пароль</label>
            <input type="password" id="password-input" placeholder="••••••••">
        </div>

        <div class="input-group">
            <label>Подтвердите пароль</label>
            <input type="password" id="sec-password-input" placeholder="••••••••">
        </div>

        <button id="register-button" class="btn btn-primary">Зарегистрироваться</button>

        <a href="../woof/index.html" class="back-link">← Назад</a>
    </div>
    <script src="../meow/calculate.js"></script>
    <script src="../meow/validation.js"></script> 
</body>

</html>
