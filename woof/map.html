<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Аркадий Паровозов - Карта</title>
    <link rel="apple-touch-icon" href="/icons/launchericon-192x192.png">
    <link rel="shortcut icon" href="/icons/launchericon-48x48.png">
    
    <script src="https://api-maps.yandex.ru/2.1/?apikey=31fb7683-a395-48c6-ac18-eea830f723b0&lang=ru_RU" type="text/javascript"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .top-left-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .top-right-icons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 2px solid #bdb7b7;
            cursor: pointer;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            transform: scale(1.1);
            background-color: #45679a;
            border: none;
        }

        .bottom-right-icon {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 2px solid #bdb7b7;
            cursor: pointer;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 100;
            transition: all 0.2s ease;
        }

        .bottom-right-icon:hover {
            transform: scale(1.1);
            background-color: #45679a;
            border: none;
        }

        .burger-menu {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 2px solid #bdb7b7;
            cursor: pointer;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .burger-menu:hover {
            transform: scale(1.1);
            background-color: #45679a;
            border: none;
        }

        .burger-line {
            width: 20px;
            height: 3px;
            background-color: #000;
            border-radius: 3px;
        }

    
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="map-container"></div>
    
    <div class="top-left-icons">
        <div class="burger-menu" onclick="location.href='../woof/humburger.html'">
            <div class="burger-line"></div>
            <div class="burger-line"></div>
            <div class="burger-line"></div>
        </div>
    </div>

    <div class="top-right-icons">
        <div class="icon-btn" id="friendIcon" onclick="addFriend()">😼</div>
    </div>

    <div class="bottom-right-icon" id="settingsIcon" onclick="location.href='../woof/settings.html'">⚙️</div>
    

    <script>
        let map;
        let userPlacemark;
        
        function showGeoMessage(text, isError = false) {
            const message = document.getElementById('geoMessage');
            message.textContent = text;
            message.style.backgroundColor = isError ? '#ffebee' : 'white';
            message.style.borderColor = isError ? '#f44336' : '#45679a';
            message.classList.add('show');
            
            setTimeout(() => {
                message.classList.remove('show');
            }, 3000);
        }
        
        function initMap() {
            try {
                const defaultCenter = [55.76, 37.64];
                
                map = new ymaps.Map('map-container', {
                    center: defaultCenter,
                    zoom: 15,
                    controls: ['zoomControl']
                });
                
                console.log('Карта успешно создана');
                
                if (navigator.geolocation) {
                    showGeoMessage('Запрашиваем доступ к геолокации...');
                    
                    navigator.geolocation.getCurrentPosition(
                        function(position) {
                            try {
                                const userCoords = [position.coords.latitude, position.coords.longitude];
                                
                                map.setCenter(userCoords, 16);
                                
                                if (userPlacemark) {
                                    map.geoObjects.remove(userPlacemark);
                                }
                                
                                userPlacemark = new ymaps.Placemark(userCoords, {
                                    hintContent: 'Вы здесь',
                                    balloonContent: 'Ваше текущее местоположение'
                                }, {
                                    preset: 'islands#blueCircleDotIcon',
                                    iconColor: '#45679a'
                                });
                                
                                map.geoObjects.add(userPlacemark);
                                showGeoMessage('Местоположение определено');
                            } catch(e) {
                                console.error('Ошибка при установке метки:', e);
                                showGeoMessage('Ошибка отображения метки', true);
                            }
                        },
                        function(error) {
                            let errorText = 'Ошибка геолокации: ';
                            switch(error.code) {
                                case error.PERMISSION_DENIED:
                                    errorText += 'Вы запретили доступ';
                                    break;
                                case error.POSITION_UNAVAILABLE:
                                    errorText += 'Информация недоступна';
                                    break;
                                case error.TIMEOUT:
                                    errorText += 'Время ожидания истекло';
                                    break;
                                default:
                                    errorText += 'Неизвестная ошибка';
                            }
                            showGeoMessage(errorText, true);
                            console.error(errorText);
                        }
                    );
                } else {
                    showGeoMessage('Браузер не поддерживает геолокацию', true);
                }
                
                map.events.add('click', function(e) {
                    const coords = e.get('coords');
                    console.log('Координаты клика:', coords);
                });

                checkSavedRoute();
                
            } catch (error) {
                console.error('Ошибка при создании карты:', error);
                showGeoMessage('Ошибка загрузки карты', true);
            }
        }
        
        function addFriend() {
            showGeoMessage('Функция добавления друга в разработке');
        }
        
        function buildRoute(from, to) {
            if (!map) {
                showGeoMessage('Карта еще не загружена', true);
                return;
            }
            
            showGeoMessage('Строим безопасный маршрут...');
            
            ymaps.route([from, to], {
                mapStateAutoApply: true
            }).then(function(route) {
                map.geoObjects.add(route);
                showGeoMessage('Маршрут построен');
            }, function(error) {
                showGeoMessage('Ошибка построения маршрута', true);
                console.error(error);
            });
        }
        
        function checkSavedRoute() {
            const pointA = localStorage.getItem('routePointA');
            const pointB = localStorage.getItem('routePointB');
            
            if (pointA && pointB && map) {
                buildRoute(pointA, pointB);
                localStorage.removeItem('routePointA');
                localStorage.removeItem('routePointB');
            }
        }
        
        ymaps.ready(function() {
            console.log('API Яндекс.Карт загружен');
            initMap();
        });

        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                console.error('Ошибка загрузки скрипта:', e.target.src);
                showGeoMessage('Ошибка загрузки карты', true);
            }
        });
    </script>
</body>

</html>
