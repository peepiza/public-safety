<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение "Аркадий-паровозов"</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=985a7e68-8ff9-4339-a7f8-2002f5645e3a&lang=ru_RU" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            position: relative;
        }

        .iphone-frame {
            background-color: #111;
            border-radius: 40px;
            padding: 10px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            margin: 0 auto;
            max-width: 380px;
            border: 3px solid #000;
        }

        .iphone-screen {
            background-color: #fff;
            border-radius: 30px;
            overflow: hidden;
            aspect-ratio: 9/19;
            position: relative;
        }

        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .top-left-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .burger-menu {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 2px solid #bdb7b7;
            cursor: pointer;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .burger-menu:hover {
            transform: scale(1.1);
            background-color: #45679a;
            border: none;
        }

        .burger-menu.active {
            background-color: #45679a;
        }

        .burger-line {
            width: 20px;
            height: 3px;
            background-color: #000;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .burger-menu.active .burger-line {
            background-color: white;
        }

        .top-right-icons {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 2px solid #bdb7b7;
            cursor: pointer;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            transform: scale(1.1);
            background-color: #45679a;
            border: none;
        }

        .bottom-right-icon {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 2px solid #bdb7b7;
            cursor: pointer;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 10;
            transition: all 0.2s ease;
        }

        .bottom-right-icon:hover {
            transform: scale(1.1);
            background-color: #45679a;
            border: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 5;
            border-radius: 30px;
        }

        .overlay.active {
            display: block;
        }

        .route-window {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: white;
            border-top: 3px solid #000;
            border-radius: 30px 30px 0 0;
            padding: 25px 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 15;
            box-shadow: 0 -10px 20px rgba(0, 0, 0, 0.2);
        }

        .route-window.active {
            transform: translateY(0);
        }

        .route-title {
            color: #000;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
        }

        .route-input-group {
            margin-bottom: 15px;
        }

        .route-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #000;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .route-label .marker {
            font-size: 20px;
        }

        .route-input {
            width: 100%;
            padding: 15px 20px;
            border: 3px solid #45679a;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            background-color: white;
            transition: border-color 0.2s;
        }

        .route-input:focus {
            border-color: #317530;
        }

        .route-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .route-btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border: 2px solid #000000;
        }

        .route-btn-build {
            background-color: #45679a;
            color: white;
        }

        .route-btn-build:hover {
            background-color: #3f5981;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000000;
        }

        .route-btn-cancel {
            background-color: #c1c5cd;
            color: white;
        }

        .route-btn-cancel:hover {
            background-color: #a0a4ab;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000000;
        }

        .route-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000;
        }

        .close-icon {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            transition: color 0.2s;
        }

        .close-icon:hover {
            color: #ff3860;
        }

        .info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #45679a;
            max-width: 250px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: infoAppear 0.3s ease;
        }

        @keyframes infoAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .info-card p {
            color: #000;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .close-info {
            background-color: #45679a;
            color: white;
            border: 2px solid #000;
            padding: 10px 30px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .close-info:hover {
            background-color: #3f5981;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000000;
        }

        .close-info:active {
            transform: scale(0.95);
        }

        #infoContainer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 20;
        }

        #infoContainer > * {
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="iphone-frame">
            <div class="iphone-screen">
                <div id="map-container"></div>
                
                <div class="overlay" id="overlay" onclick="closeRouteWindow()"></div>

                <div class="top-left-icons">
                    <div class="burger-menu" id="burgerMenu" onclick="toggleRouteWindow()">
                        <div class="burger-line"></div>
                        <div class="burger-line"></div>
                        <div class="burger-line"></div>
                    </div>
                </div>

                <div class="top-right-icons">
                    <div class="icon-btn" id="friendIcon" onclick="showFriendMessage()">😼</div>
                </div>

                <div class="bottom-right-icon" id="settingsIcon" onclick="location.href='settings.html'">⚙️</div>

                <div class="route-window" id="routeWindow">
                    <div class="close-icon" onclick="closeRouteWindow()">×</div>
                    <div class="route-title">Построить маршрут</div>
                    
                    <div class="route-input-group">
                        <div class="route-label">
                            <span class="marker"></span> Точка А (начало)
                        </div>
                        <input type="text" class="route-input" id="pointA" placeholder="например: Тверская ул., 7">
                    </div>

                    <div class="route-input-group">
                        <div class="route-label">
                            <span class="marker"></span> Точка Б (конец)
                        </div>
                        <input type="text" class="route-input" id="pointB" placeholder="например: Красная площадь">
                    </div>

                    <div class="route-buttons">
                        <button class="route-btn route-btn-build" onclick="buildRoute()">Построить</button>
                        <button class="route-btn route-btn-cancel" onclick="closeRouteWindow()">Отмена</button>
                    </div>
                </div>

                <div id="infoContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let userLocation;

        ymaps.ready(initMap);

        function initMap() {
            const defaultCoords = [55.76, 37.64];
            
            map = new ymaps.Map('map-container', {
                center: defaultCoords,
                zoom: 12,
                controls: ['zoomControl']
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const userCoords = [position.coords.latitude, position.coords.longitude];
                        map.setCenter(userCoords, 15);
                        
                        const placemark = new ymaps.Placemark(userCoords, {
                            hintContent: 'Вы здесь'
                        }, {
                            preset: 'islands#blueCircleDotIcon',
                            iconColor: '#45679a'
                        });
                        map.geoObjects.add(placemark);
                        userLocation = userCoords;
                    },
                    function(error) {
                        console.log('Геолокация не доступна');
                    }
                );
            }
        }

        function toggleRouteWindow() {
            const window = document.getElementById('routeWindow');
            const burger = document.getElementById('burgerMenu');
            const overlay = document.getElementById('overlay');
            
            window.classList.toggle('active');
            burger.classList.toggle('active');
            
            if (window.classList.contains('active')) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
                clearInputs();
            }
        }

        function closeRouteWindow() {
            const window = document.getElementById('routeWindow');
            const burger = document.getElementById('burgerMenu');
            const overlay = document.getElementById('overlay');
            
            window.classList.remove('active');
            burger.classList.remove('active');
            overlay.classList.remove('active');
            
            clearInputs();
        }

        function clearInputs() {
            document.getElementById('pointA').value = '';
            document.getElementById('pointB').value = '';
        }

        function buildRoute() {
            const pointA = document.getElementById('pointA').value.trim();
            const pointB = document.getElementById('pointB').value.trim();
            
            if (!pointA || !pointB) {
                showMessage('Заполните оба поля!');
                return;
            }
            
            showMessage(` Маршрут строится: ${pointA} → ${pointB}`);
                        
            setTimeout(() => {
                closeRouteWindow();
            }, 1500);
        }

        function showFriendMessage() {
            showMessage('Функция добавления друга в разработке');
        }

        function showMessage(text) {
            const oldInfo = document.querySelector('.info-card');
            if (oldInfo) oldInfo.remove();

            const infoDiv = document.createElement('div');
            infoDiv.className = 'info-card';
            infoDiv.innerHTML = `
                <p>${text}</p>
                <button class="close-info" onclick="this.parentElement.remove()">OK</button>
            `;

            document.getElementById('infoContainer').appendChild(infoDiv);

            setTimeout(() => {
                if (infoDiv.parentElement) {
                    infoDiv.remove();
                }
            }, 3000);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeRouteWindow();
            }
        });

        document.getElementById('pointA').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('pointB').focus();
            }
        });

        document.getElementById('pointB').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                buildRoute();
            }
        });
    </script>
</body>

</html>
