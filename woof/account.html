<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение "Аркадий-паровозов"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: white;
            max-width: 400px;
            width: 100%;
            padding: 190px 30px;
            border-radius: 30px;
            border: 3px solid #000;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 30px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .info {
            background-color: #f5f5f5;
            border: 3px solid #45679a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info p {
            margin: 15px 0;
            font-size: 18px;
            word-break: break-word;
        }

        .info strong {
            color: #45679a;
            display: inline-block;
            width: 120px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #45679a;
            color: white;
            border: 2px solid #000;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
        }

        button:hover {
            background-color: #3f5981;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000000
        }

        .back-btn {
            display: block;
            width: 60px;
            height: 60px;
            background-color: #c1c5cd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            text-decoration: none;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Мой аккаунт</h1>
        <div class="info" id="userInfo">
            <p><strong>Имя:</strong> <span id="userName">...</span></p>
            <p><strong>Телефон:</strong> <span id="userPhone">...</span></p>
            <p><strong>Дата рождения:</strong> <span id="userBirth">...</span></p>
        </div>

        <button id="logoutBtn">Выйти</button>

        <a href="woof/settings.html" class="back-btn">←</a>
    </div>

    <script src="../meow/account.js"></script>
</body>

</html>
