<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>приложение "Аркадий-паровозов"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: white;
            max-width: 400px;
            width: 100%;
            padding: 340px 60px;
            border-radius: 60px;
            border: 3px solid #000;
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        .btn-primary {
            background-color: #45679a;
            color: white;
            border: 2px solid #000000;
        }

        .btn-primary:hover {
            background-color: #3f5981;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000000
        }

        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000000;
        }

        .btn-secondary {
            background-color: #45679a;
            color: white;
            border: 2px solid #000000;
        }

        .btn-secondary:hover {
            background-color: #3f5981;
            transform: translateY(-1px);
            box-shadow: 0 2px 0 #000;
        }

        .btn-secondary:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000;
        }
    </style>
</head>

<body>
    <div class="card">
        <button onclick="location.href='openAc.html'" class="btn btn-primary">Войти в аккаунт</button>
        <button onclick="location.href='register.html'" class="btn btn-secondary">Регистрация</button>
    </div>
</body>

</html>
