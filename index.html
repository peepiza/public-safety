<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение "Аркадий-паровозов" - Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: white;
            max-width: 400px;
            width: 100%;
            padding: 330px 40px;
            border-radius: 60px;
            border: 3px solid #000;
            text-align: center;
        }

        

        .btn {
            display: block;
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            background-color: #45679a;
            color: white;
            border: 2px solid #000;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #3f5981;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #000;
        }
    </style>
</head>

<body>
    <div class="card">
        <a href="woof/openAc.html" class="btn">Вход в аккаунт</a>
        <a href="woof/register.html" class="btn">Регистрация</a>
    </div>
</body>

</html>
