<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркадий Паровозов - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background-color: white;
            width: 100%;
            padding: 40px 30px;
            border-radius: 60px;
            border: 3px solid #000;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
        }

        .app-title {
            color: #000;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border: 2px solid #000;
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        .btn-primary {
            background-color: #45679a;
            color: white;
        }

        .btn-primary:hover {
            background-color: #3f5981;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #000;
        }

        .btn-secondary {
            background-color: #c1c5cd;
            color: #000;
        }

        .btn-secondary:hover {
            background-color: #a5a9b1;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #000;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            color: #000;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            border: 3px solid #45679a;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
        }

        .input-field:focus {
            border-color: #2d4a7a;
        }

        .register-link {
            margin-top: 20px;
            color: #45679a;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="app-title">Аркадий Паровозов</div>
            
            <div class="input-group">
                <label class="input-label">Телефон или email</label>
                <input type="text" class="input-field" id="login" placeholder="+7 (999) 123-45-67">
            </div>

            <div class="input-group">
                <label class="input-label">Пароль</label>
                <input type="password" class="input-field" id="password" placeholder="••••••••">
            </div>

            <!-- ГЛАВНОЕ ИСПРАВЛЕНИЕ: сразу на карту -->
            <button class="btn btn-primary" onclick="goToMap()">Войти</button>
            <button class="btn btn-secondary" onclick="goToMap()">Регистрация</button>
            
            <!-- Инструкция как дополнительная опция -->
            <div class="register-link" onclick="location.href='instra.html'">
                📖 Посмотреть инструкцию
            </div>
        </div>
    </div>

    <script>
        function goToMap() {
            // Здесь будет проверка логина/пароля
            // А пока просто переходим на карту
            window.location.href = 'map.html';
        }
    </script>
</body>

</html>
