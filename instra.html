<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркадий Паровозов - Инструкция</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .instruction-card {
            background-color: white;
            width: 100%;
            padding: 40px 30px;
            border-radius: 60px;
            border: 3px solid #000;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            text-align: left;
            padding: 10px;
            border-radius: 20px;
            background-color: #f5f5f5;
        }

        .icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #45679a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .text {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            border: 2px solid #000;
            background-color: #45679a;
            color: white;
        }

        .btn:hover {
            background-color: #3f5981;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="instruction-card">
            <div class="title">Инструкция</div>
            
            <div class="instruction-item">
                <div class="icon">🍔</div>
                <div class="text">Меню для построения безопасного маршрута. Учитывает освещение, погоду и отзывы.</div>
            </div>

            <div class="instruction-item">
                <div class="icon">👤</div>
                <div class="text">Добавление друзей для наблюдения. Они увидят ваш маршрут.</div>
            </div>

            <div class="instruction-item">
                <div class="icon">⚙️</div>
                <div class="text">Настройки и чёрный список. Заблокируйте нежелательных наблюдателей.</div>
            </div>

            <!-- КНОПКА ВОЗВРАТА НА КАРТУ -->
            <button class="btn" onclick="location.href='map.html'">
                Перейти к карте
            </button>
        </div>
    </div>
</body>

</html>
